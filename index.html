<body>

<form action="/action_page.php">
  <label for="Pname">Patient Name:</label>
  <input type="text" id="Pname" name="Pname"><br><br>

  <label for="IDnumber">ID #:</label>
  <input type="text" id="IDnumber" name="IDnumber"><br><br>
  <input type="submit" value="Submit">
    <br><br><br>

 <label for="service">Service:</label>
  <select name="service" id="service">
    <option value="dental">Dental Check-up (PHP 850) </option>
    <option value="eye">Eye Check-up (PHP 900)</option>
    <option value="physical">Physical Exam (PHP 800)</option>
  </select>
  <input type="submit" value="Submit">
  <br>

  <label for="session">Sessions (Max of 3):</label>
  <input type="number" id="session" name="session" min="1" max="3">
  <input type="submit">
</form>
    
    <label for="custType">Customer Type:</label>
      <select name="custType" id="custType">
        <option value="nondiscounted">Regular</option>
        <option value="discounted">PWD/Senior</option>
  </select>
  <input type="submit" value="Submit">
  <br>
  <br>

  <button onclick="createReceipt()">Book Appointment</button>

<p id="receipt"></p>
